  <text x="185" y="144" fill="#EFE8D2" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">projected_warmup.py</text>
  <text x="190" y="230" fill="#EFE8D2" font-family="Menlo, Consolas, monospace" font-size="34">total = 0</text>
  <text x="190" y="295" fill="#EFE8D2" font-family="Menlo, Consolas, monospace" font-size="34">for i in range(5):</text>
  <text x="235" y="360" fill="#EFE8D2" font-family="Menlo, Consolas, monospace" font-size="34">total = total + i</text>
  <text x="190" y="425" fill="#EFE8D2" font-family="Menlo, Consolas, monospace" font-size="34">print(total)</text>

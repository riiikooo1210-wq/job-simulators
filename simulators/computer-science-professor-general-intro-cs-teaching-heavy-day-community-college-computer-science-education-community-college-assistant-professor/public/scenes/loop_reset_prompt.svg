<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Projected Python loop prompt in a community college computer lab">
  <rect width="1600" height="900" fill="#E8DCC8"/>
  <rect x="0" y="650" width="1600" height="250" fill="#D8C99F"/>
  <rect x="115" y="70" width="1370" height="555" fill="#F7F1E3" stroke="#1E1E1A" stroke-width="5"/>

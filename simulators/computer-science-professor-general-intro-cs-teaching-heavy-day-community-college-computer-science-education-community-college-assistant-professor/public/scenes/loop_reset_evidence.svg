<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Quick check results before moving to accumulators">
  <rect width="1600" height="900" fill="#E8DCC8"/>
  <rect x="110" y="80" width="1380" height="560" fill="#F7F1E3" stroke="#1E1E1A" stroke-width="5"/>
  <text x="160" y="145" fill="#3A6B5E" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="900">Quick check: before accumulators</text>
  <rect x="165" y="200" width="560" height="340" fill="#FFF9EB" stroke="#1E1E1A" stroke-width="4"/>
  <text x="205" y="255" fill="#1E1E1A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Poll results</text>
  <text x="205" y="315" fill="#1E1E1A" font-family="Inter, Arial, sans-serif" font-size="24">range(5) stops before 5</text>
  <rect x="205" y="335" width="420" height="36" fill="#D8C99F"/>
  <rect x="205" y="335" width="330" height="36" fill="#3A6B5E"/>
  <text x="645" y="363" fill="#1E1E1A" font-family="Inter, Arial, sans-serif" font-size="24">21</text>
  <text x="205" y="425" fill="#1E1E1A" font-family="Inter, Arial, sans-serif" font-size="24">total updates inside loop</text>
  <rect x="205" y="445" width="420" height="36" fill="#D8C99F"/>
  <rect x="205" y="445" width="235" height="36" fill="#B87D6B"/>
  <text x="645" y="473" fill="#1E1E1A" font-family="Inter, Arial, sans-serif" font-size="24">15</text>
  <rect x="815" y="200" width="560" height="340" fill="#EFE8D2" stroke="#1E1E1A" stroke-width="4"/>
  <text x="855" y="255" fill="#1E1E1A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Teacher decision</text>
  <text x="855" y="315" fill="#3A6B5E" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">Evidence says:</text>
  <text x="855" y="360" fill="#1E1E1A" font-family="Inter, Arial, sans-serif" font-size="24">Boundary is improving.</text>
  <text x="855" y="402" fill="#1E1E1A" font-family="Inter, Arial, sans-serif" font-size="24">Accumulator update is still shaky.</text>
  <line x1="855" y1="440" x2="1335" y2="440" stroke="#CDBF94" stroke-width="3"/>
  <text x="855" y="492" fill="#B87D6B" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="900">One more trace before moving on.</text>
  <rect x="0" y="690" width="1600" height="210" fill="#D8C99F"/>
  <rect x="240" y="730" width="260" height="90" fill="#F2EBD9" stroke="#1E1E1A" stroke-width="3"/>
  <text x="278" y="785" fill="#1E1E1A" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">Trace again</text>
  <rect x="670" y="730" width="260" height="90" fill="#F2EBD9" stroke="#1E1E1A" stroke-width="3"/>
  <text x="710" y="785" fill="#1E1E1A" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">Then accumulate</text>
  <rect x="1100" y="730" width="260" height="90" fill="#F2EBD9" stroke="#1E1E1A" stroke-width="3"/>
  <text x="1150" y="785" fill="#1E1E1A" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">Log evidence</text>
</svg>

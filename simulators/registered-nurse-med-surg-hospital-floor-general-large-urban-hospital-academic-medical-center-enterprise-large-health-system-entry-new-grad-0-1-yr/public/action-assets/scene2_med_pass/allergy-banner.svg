<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Allergy banner for Mrs. Vance</title>
  <desc id="desc">Readable allergy and adverse reaction banner listing morphine nausea, vomiting, and confusion.</desc>
  <rect width="900" height="520" rx="0" fill="#F7F1E3"/>
  <rect x="32" y="32" width="836" height="456" rx="0" fill="#FFF8E8" stroke="#1E1E1A" stroke-width="6"/>
  <rect x="32" y="32" width="836" height="92" fill="#B87D6B" stroke="#1E1E1A" stroke-width="6"/>
  <text x="62" y="91" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800" fill="#1E1E1A">Allergies / ADR</text>
  <text x="62" y="176" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#3A6B5E">Patient: Eleanor Vance</text>
  <line x1="62" y1="207" x2="838" y2="207" stroke="#CDBF94" stroke-width="4"/>
  <text x="62" y="266" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="900" fill="#1E1E1A">Morphine</text>
  <text x="62" y="326" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#1E1E1A">Reaction: nausea/vomiting, confusion</text>
</svg>
